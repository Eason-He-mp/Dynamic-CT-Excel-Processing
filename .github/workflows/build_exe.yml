name: Build 32-bit Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up 32-bit Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # 【关键修改】：改为 3.9
        architecture: 'x86'    # 保持 32 位不变
        cache: 'pip'

    - name: Verify Python Architecture
      run: python -c "import struct; print('Python Architecture:', struct.calcsize('P') * 8, 'bit')"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --clean CT_Data_Processor.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: CT_Data_Processor_Win32_EXE
        path: dist/CT_Data_Processor.exe
        retention-days: 7
